<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Co-signature — BRIBLUE</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
.header{background:linear-gradient(135deg,#0c1222,#0369a1);padding:20px 24px;display:flex;align-items:center;gap:14px}
.header-logo{font-size:22px;font-weight:900;color:#fff;letter-spacing:1px}
.header-badge{background:rgba(255,255,255,0.15);color:#fff;font-size:11px;padding:4px 10px;border-radius:20px;font-weight:600;margin-top:4px;display:inline-block}
.container{max-width:600px;margin:0 auto;padding:24px 16px 60px}
.card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;padding:20px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f1f5f9;font-size:14px;gap:8px}
.info-row:last-child{border-bottom:none}
.info-label{color:#64748b;font-weight:500}
.info-value{font-weight:700;color:#1e293b;text-align:right}
.client-sig{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:12px;padding:14px;margin-bottom:16px}
.client-sig-title{font-size:12px;font-weight:700;color:#059669;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.client-sig img{max-height:60px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;display:block}
.sig-section{background:#fff;border-radius:16px;border:2px solid #0369a1;padding:20px;margin-bottom:16px}
.sig-title{font-size:16px;font-weight:700;color:#0369a1;margin-bottom:4px}
.sig-sub{font-size:13px;color:#64748b;margin-bottom:14px;line-height:1.5}
canvas{border:2px dashed #cbd5e1;border-radius:10px;cursor:crosshair;display:block;width:100%;touch-action:none;background:#fafafa}
.sig-actions{display:flex;gap:8px;margin-top:10px}
.btn-clear{background:#f1f5f9;color:#64748b;border:1px solid #e2e8f0;padding:12px 20px;border-radius:10px;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600;min-height:44px}
.btn-submit{background:linear-gradient(135deg,#0369a1,#0ea5e9);color:#fff;border:none;padding:18px;border-radius:14px;font-size:17px;font-weight:800;cursor:pointer;font-family:inherit;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(3,105,161,0.35);margin-top:12px;min-height:56px}
.btn-submit:disabled{background:#cbd5e1;box-shadow:none;cursor:not-allowed}
.success{background:#d1fae5;border:1.5px solid #6ee7b7;border-radius:16px;padding:28px;text-align:center}
.success-icon{font-size:48px;margin-bottom:12px}
.success-title{font-size:20px;font-weight:900;color:#059669;margin-bottom:6px}
.success-sub{font-size:13px;color:#047857}
.loading{text-align:center;padding:60px 20px;color:#64748b;font-size:15px}
.error-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:12px;padding:16px;color:#dc2626;font-size:13px;margin-bottom:16px}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-logo">BRI'BLUE</div>
    <div class="header-badge">Co-signature prestataire</div>
  </div>
</div>

<div class="container">
  <div id="loading" class="loading">Chargement du contrat...</div>
  <div id="content" style="display:none"></div>
  <div id="success" class="success" style="display:none">
    <div class="success-icon">✅</div>
    <div class="success-title">Contrat co-signé !</div>
    <div class="success-sub">Le contrat est maintenant signé par les deux parties.</div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const clientId = params.get('clientId');
const contractId = params.get('contractId') || ('CT-' + clientId);
let drawing = false;

function setupCanvas(canvas) {
  const ctx = canvas.getContext('2d');
  function pos(e) {
    const r = canvas.getBoundingClientRect();
    const s = e.touches ? e.touches[0] : e;
    return { x: (s.clientX - r.left) * (canvas.width / r.width), y: (s.clientY - r.top) * (canvas.height / r.height) };
  }
  canvas.addEventListener('mousedown', e => { drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.strokeStyle='#1b3a5c'; ctx.lineWidth=2.5; ctx.lineCap='round'; });
  canvas.addEventListener('mousemove', e => { if(!drawing)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); });
  canvas.addEventListener('mouseup', () => drawing=false);
  canvas.addEventListener('mouseleave', () => drawing=false);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; const p=pos(e); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.strokeStyle='#1b3a5c'; ctx.lineWidth=2.5; ctx.lineCap='round'; }, {passive:false});
  canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!drawing)return; const p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); }, {passive:false});
  canvas.addEventListener('touchend', () => drawing=false);
}

function clearCanvas(id) {
  const c = document.getElementById(id);
  if (c) c.getContext('2d').clearRect(0, 0, c.width, c.height);
}

function isCanvasEmpty(canvas) {
  return !canvas.getContext('2d').getImageData(0,0,canvas.width,canvas.height).data.some(v=>v!==0);
}

async function loadContract() {
  if (!clientId) {
    document.getElementById('loading').innerHTML = '<div style="color:#dc2626">Lien invalide.</div>';
    return;
  }
  try {
    const res = await fetch(`/api/get-contract?clientId=${clientId}`);
    const json = await res.json();
    if (!res.ok) throw new Error(json.error);

    const c = json.client;
    const contrat = json.contrat || {};
    const clientSigHTML = contrat.signatureClient
      ? `<div class="client-sig"><div class="client-sig-title">Signature du client ✓</div><img src="${contrat.signatureClient}" alt="Signature client"/></div>`
      : '';

    const dateDebut = c.dateDebut ? new Date(c.dateDebut).toLocaleDateString('fr') : '—';
    const dateFin = c.dateFin ? new Date(c.dateFin).toLocaleDateString('fr') : '—';
    let totE=0, totC=0;
    for(let m=1;m<=12;m++){const v=(c.moisParMois||{})[m]||(c.moisParMois||{})[String(m)]||{entretien:0,controle:0};totE+=v.entretien||0;totC+=v.controle||0;}
    const totalAnnuel = totE*(c.prixPassageE||0)+totC*(c.prixPassageC||0);

    if (contrat.statut === 'signe_complet') {
      document.getElementById('loading').style.display='none';
      document.getElementById('success').style.display='block';
      document.getElementById('success').querySelector('.success-sub').innerHTML='Ce contrat a déjà été co-signé.';
      return;
    }

    document.getElementById('content').innerHTML = `
      <h2 style="font-size:22px;font-weight:900;color:#0c1222;margin-bottom:4px;">Co-signature prestataire</h2>
      <p style="font-size:13px;color:#64748b;margin-bottom:20px;">Contrat de ${c.nom}</p>

      <div class="card">
        <div class="card-title">Informations</div>
        <div class="info-row"><span class="info-label">Client</span><span class="info-value">${c.nom}</span></div>
        <div class="info-row"><span class="info-label">Formule</span><span class="info-value">${c.formule||'—'}</span></div>
        <div class="info-row"><span class="info-label">Période</span><span class="info-value">${dateDebut} → ${dateFin}</span></div>
        <div class="info-row"><span class="info-label">Prix annuel</span><span class="info-value" style="color:#0369a1;font-size:16px;">${totalAnnuel.toLocaleString('fr')} €</span></div>
      </div>

      ${clientSigHTML}

      <div class="sig-section">
        <div class="sig-title">Votre signature — Dorian Briaire</div>
        <div class="sig-sub">Signez pour valider le contrat de votre côté.</div>
        <canvas id="sigPresta" width="500" height="150"></canvas>
        <div class="sig-actions">
          <button class="btn-clear" onclick="clearCanvas('sigPresta')">Effacer</button>
        </div>
      </div>

      <div id="error-msg"></div>

      <button class="btn-submit" id="btn-submit" onclick="submitSignature()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Co-signer le contrat
      </button>
    `;

    document.getElementById('loading').style.display='none';
    document.getElementById('content').style.display='block';
    setupCanvas(document.getElementById('sigPresta'));

  } catch(err) {
    document.getElementById('loading').innerHTML=`<div style="color:#dc2626">Erreur : ${err.message}</div>`;
  }
}

let submitting = false;
async function submitSignature() {
  if (submitting) return;
  const canvas = document.getElementById('sigPresta');
  if (isCanvasEmpty(canvas)) {
    document.getElementById('error-msg').innerHTML='<div class="error-box">Veuillez signer avant de valider.</div>';
    return;
  }
  submitting = true;
  const btn = document.getElementById('btn-submit');
  btn.disabled=true; btn.textContent='Envoi en cours...';
  document.getElementById('error-msg').innerHTML='';
  try {
    const res = await fetch('/api/sign-contract', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        contractId,
        clientId,
        signatureClient: 'prestataire_only',
        signaturePrestataire: canvas.toDataURL('image/png'),
        signedAt: new Date().toISOString(),
        isPrestataire: true,
      }),
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error);
    document.getElementById('content').style.display='none';
    document.getElementById('success').style.display='block';
  } catch(err) {
    document.getElementById('error-msg').innerHTML=`<div class="error-box">Erreur : ${err.message}</div>`;
    submitting = false; btn.disabled=false; btn.textContent='Co-signer le contrat';
  }
}

loadContract();
</script>
</body>
</html>
